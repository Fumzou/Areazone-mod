plugins {
    id 'fabric-loom' version '1.10.0-alpha.15'
}

version = '1.0.0'
archivesBaseName = 'follower-sphere'

sourceCompatibility = JavaVersion.VERSION_17
targetCompatibility = JavaVersion.VERSION_17

repositories {
    maven { url 'https://maven.fabricmc.net/' }
    mavenCentral()
}

dependencies {
    minecraft 'com.mojang:minecraft:1.21.1'
    mappings 'net.fabricmc:yarn:1.21.1+build.1:v2'
    modImplementation 'net.fabricmc:fabric-loader:0.14.11'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.116.1+1.21.1'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

loom {
    runs {
        client {
            vmArg "-Dfabric.client"
            vmArg "-Xmx2G"
        }
        server {
            vmArg "-Dfabric.server"
            vmArg "-Xmx2G"
        }
    }
}

tasks.processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}
